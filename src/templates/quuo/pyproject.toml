[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".serverless",
    ".venv",
    "node_modules",
    "requirements",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "SIM", "C90", "UP", "ARG", "RET", "BLE", "S"]
ignore = [
    "S101",
    "S105",
    "S106",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "ARG"]
"handlers/*" = ["ARG001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
